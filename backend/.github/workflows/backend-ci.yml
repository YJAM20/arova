name: Arova Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore OurLittleUniverse.slnx

    - name: Build Project
      # Compiles the backend project in Release configuration to verify syntax correctness
      run: dotnet build OurLittleUniverse.slnx --configuration Release --no-restore

    # Note: No backend automated tests currently exist in the solution.
    # Build validation serves as the primary CI gate for this repository.
