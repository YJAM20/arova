<!-- Global Background Shader -->

<!-- STITCH_SHADER_START:ANIMATION_2 class="absolute inset-0 w-full h-full" -->
<div class="absolute inset-0 w-full h-full" style="display:block;">
<canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;

float noise(vec2 p) {
    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
}

void main() {
    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
    vec3 color = vec3(0.01, 0.005, 0.05); // Deep space base
    
    // Subtle nebula glow
    float glow = sin(uv.x * 3.0 + u_time * 0.2) * 0.5 + 0.5;
    color += vec3(0.95, 0.45, 0.71) * glow * 0.05; // Neon pink hint
    
    // Twinkling stars
    vec2 starPos = uv * 50.0;
    float n = noise(floor(starPos));
    if (n > 0.98) {
        float twink = sin(u_time * (n * 10.0)) * 0.5 + 0.5;
        color += vec3(1.0) * twink * n;
    }
    
    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        function switchTab(tab) {
            const signinForm = document.getElementById('signin-form');
            const registerForm = document.getElementById('register-form');
            const signinTab = document.getElementById('tab-signin');
            const registerTab = document.getElementById('tab-register');

            if (tab === 'signin') {
                signinForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                
                signinTab.classList.add('text-primary', 'border-primary');
                signinTab.classList.remove('text-on-surface-variant/60', 'border-transparent');
                
                registerTab.classList.remove('text-primary', 'border-primary');
                registerTab.classList.add('text-on-surface-variant/60', 'border-transparent');
            } else {
                signinForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                
                registerTab.classList.add('text-primary', 'border-primary');
                registerTab.classList.remove('text-on-surface-variant/60', 'border-transparent');
                
                signinTab.classList.remove('text-primary', 'border-primary');
                signinTab.classList.add('text-on-surface-variant/60', 'border-transparent');
            }
        }

        // Mouse trail effect on the card
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                card.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255, 175, 211, 0.08) 0%, rgba(255, 255, 255, 0.03) 70%)`;
            } else {
                card.style.background = `rgba(255, 255, 255, 0.03)`;
            }
        });
    </script>
