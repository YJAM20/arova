<div class="onboarding-page">
  <section class="intro animate-fade-in">
    <p class="eyebrow">Local setup</p>
    <h1>Set up your couple space</h1>
    <p>
      This stays on this browser. No account server, no cloud sync, and no real personal details are needed.
    </p>
  </section>

  <form class="setup-card glass animate-fade-in" style="animation-delay: 0.08s;" (ngSubmit)="save()">
    <div class="field">
      <label for="spaceName">Couple space name</label>
      <input id="spaceName" type="text" name="spaceName" [(ngModel)]="coupleSpaceName" />
      <small>Example: Arova Space, Couple Space, Our Space.</small>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="partnerA">Partner A display name</label>
        <input id="partnerA" type="text" name="partnerA" [(ngModel)]="partnerADisplayName" />
      </div>

      <div class="field">
        <label for="partnerB">Partner B display name</label>
        <input id="partnerB" type="text" name="partnerB" [(ngModel)]="partnerBDisplayName" />
      </div>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="language">Preferred language</label>
        <select id="language" name="language" [(ngModel)]="languageMode">
          <option *ngFor="let language of languageOptions" [value]="language.value">
            {{ language.label }}
          </option>
        </select>
      </div>

      <div class="field">
        <label for="theme">Preferred theme</label>
        <select id="theme" name="theme" [(ngModel)]="activeTheme">
          <option *ngFor="let theme of themeOptions" [value]="theme.value">
            {{ theme.label }}
          </option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="secondary-action" (click)="skip()">Skip for demo mode</button>
      <button type="submit" class="primary-action" [disabled]="!canContinue">Start our space</button>
    </div>
  </form>
</div>
