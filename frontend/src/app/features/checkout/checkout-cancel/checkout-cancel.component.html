<div class="arova-page arova-page--compact cancel-page animate-fade-in">
  <section class="cancel-card glass p-8 text-center flex flex-col items-center gap-6" aria-labelledby="cancel-heading">
    <div class="cancel-icon-wrapper flex items-center justify-center" aria-hidden="true">
      <span class="cross">✕</span>
    </div>

    <header class="cancel-header">
      <p class="page-eyebrow">✦ Transaction Canceled</p>
      <h1 id="cancel-heading">Checkout canceled</h1>
      <p class="page-sub">No changes were made to your Arova demo plan.</p>
    </header>

    <div class="info-details-box p-4 rounded-xl w-full">
      <p class="text-3xs text-neutral-300">
        You can return to the plans catalogue at any time to review pricing tables, check feature differences, or simulate local sandboxed upgrades.
      </p>
    </div>

    <!-- Navigation links -->
    <div class="cancel-actions flex flex-col w-full pt-4 border-t border-neutral-800">
      <a routerLink="/plans" class="cta-btn cta-btn--plans py-3 rounded-xl font-bold">
        Back to plans
      </a>
    </div>
  </section>
</div>
