<div class="letters-page">
  <arova-page-header 
    title="Words Sealed with Love" 
    [subtitle]="letters.length + ' letters waiting in the vault' + (isApiMode ? ' / API Mode' : '')"
    eyebrow="✦ The Letters Vault"
  >
    <a actions class="add-content-link" routerLink="/letters/new" id="add-letter-btn">Add Letter</a>
  </arova-page-header>

  <arova-loading-state 
    message="Opening the vault carefully..." 
    *ngIf="isLoading"
  ></arova-loading-state>

  <arova-empty-state
    *ngIf="!isLoading && errorMessage"
    icon="✧"
    title="The vault needs a moment"
    [description]="errorMessage"
  ></arova-empty-state>

  <div class="filter-bar animate-fade-in" *ngIf="letters.length > 0 && !isLoading && !errorMessage">
    <button
      *ngFor="let cat of categories"
      type="button"
      class="filter-btn"
      [class.filter-btn--active]="activeCategory === cat.key"
      (click)="setCategory(cat.key)"
    >
      {{ cat.label }}
    </button>
  </div>

  <div
    class="letters-grid animate-fade-in"
    style="animation-delay: 0.1s;"
    *ngIf="filteredLetters.length > 0 && !isLoading && !errorMessage"
    role="list"
    aria-label="Letters from the vault"
  >
    <arova-card
      class="letter-envelope"
      *ngFor="let letter of filteredLetters; let i = index"
      [class.letter-envelope--locked]="letter.isLocked"
      [class.letter-envelope--favorite]="letter.isFavorite"
      [class.letter-envelope--private]="isAdmin && !letter.visibleToPartner"
      [routerLink]="['/letters', letter.id]"
      [style.animation-delay]="(i * 0.05) + 's'"
      [hoverable]="true"
      role="listitem"
      [tabindex]="0"
      (keydown)="openLetterFromKeyboard($event, letter.id)"
      [aria-label]="letter.title + ' - ' + getCategoryLabel(letter.category) + (letter.isLocked ? ' (Sealed)' : '')"
    >
      <div class="envelope-flap">
        <div class="flap-triangle"></div>
      </div>

      <div class="envelope-body">
        <div class="envelope-header">
          <arova-status-pill type="info" [showDot]="false">
            {{ getCategoryLabel(letter.category) }}
          </arova-status-pill>
          <span class="fav-star" *ngIf="letter.isFavorite" aria-label="Favorite letter">✦</span>
        </div>

        <h3 class="letter-title">{{ letter.title }}</h3>
        <div class="letter-date">Written {{ formatDate(letter.createdAt) }}</div>

        <div class="letter-status">
          <arova-status-pill [type]="letter.isLocked ? 'warning' : 'accent'" [showDot]="true">
            {{ letter.isLocked ? 'Sealed - Read details only' : 'Open Letter' }}
          </arova-status-pill>
        </div>

        <div class="private-tag" *ngIf="isAdmin && !letter.visibleToPartner">
          <arova-status-pill type="warning">Only you can see this</arova-status-pill>
        </div>
      </div>

      <div class="wax-seal" *ngIf="!letter.isLocked">✦</div>
      <div class="wax-seal wax-seal--locked" *ngIf="letter.isLocked">🔒</div>
    </arova-card>
  </div>

  <arova-empty-state
    *ngIf="letters.length > 0 && filteredLetters.length === 0 && !isLoading && !errorMessage"
    icon="✧"
    title="No letters match this feeling"
    description="There are no letters saved under this specific category right now."
  ></arova-empty-state>

  <arova-empty-state
    *ngIf="letters.length === 0 && !isLoading && !errorMessage"
    icon="✧"
    title="The vault is empty"
    description="Your vault is ready. Write a letter to your partner for them to open later, or when they are sad, happy, or missing you."
    actionText="Write a Letter"
    actionLink="/letters/new"
  ></arova-empty-state>
</div>
