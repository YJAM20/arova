<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <!-- Orbital ring -->
  <ellipse cx="40" cy="40" rx="28" ry="28" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Outer glow ring -->
  <ellipse cx="40" cy="40" rx="20" ry="20" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
  <!-- Core planet -->
  <circle cx="40" cy="40" r="12" fill="url(#planetGrad)"/>
  <!-- Small orbiting dot -->
  <circle cx="62" cy="29" r="3.5" fill="#e879f9" opacity="0.85"/>
  <!-- Tiny accent dot -->
  <circle cx="20" cy="52" r="2" fill="#818cf8" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="80" y="47" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" letter-spacing="6" fill="#e2e8f0">AROVA</text>
  <!-- Tagline -->
  <text x="82" y="63" font-family="Georgia, serif" font-size="9" letter-spacing="3.5" fill="#94a3b8" opacity="0.8">A PRIVATE UNIVERSE</text>
  <!-- Gradient defs -->
  <defs>
    <radialGradient id="planetGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
  </defs>
</svg>
